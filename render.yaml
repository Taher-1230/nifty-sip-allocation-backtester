services:
  - type: web
    name: nifty-sip-allocation-backtester
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 300 src.main:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
